# Default deny-all ingress for llmgw namespace, then allow only what's needed.

# Deny all ingress to llmgw by default
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: llmgw
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# Allow only summariser namespace to reach LiteLLM on port 4000
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-summariser-to-litellm
  namespace: llmgw
spec:
  podSelector:
    matchLabels:
      app: litellm
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: summariser
          podSelector:
            matchLabels:
              app: summariser-app
      ports:
        - port: 4000
          protocol: TCP
---
# Allow LiteLLM to reach Postgres on port 5432
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-litellm-to-postgres
  namespace: llmgw
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: litellm
      ports:
        - port: 5432
          protocol: TCP
---
# Allow ingress-nginx to reach LiteLLM on port 4000
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-litellm
  namespace: llmgw
spec:
  podSelector:
    matchLabels:
      app: litellm
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 4000
          protocol: TCP
---
# §7.1: Allow LiteLLM to reach Presidio Analyzer on port 5002
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-litellm-to-presidio-analyzer
  namespace: llmgw
spec:
  podSelector:
    matchLabels:
      app: presidio-analyzer
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: litellm
      ports:
        - port: 3000    # analyzer container port
          protocol: TCP
---
# §7.1: Allow LiteLLM to reach Presidio Anonymizer on port 5001
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-litellm-to-presidio-anonymizer
  namespace: llmgw
spec:
  podSelector:
    matchLabels:
      app: presidio-anonymizer
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: litellm
      ports:
        - port: 3000    # anonymizer container port
          protocol: TCP
