# DO NOT commit this file with real values.
# Apply manually: kubectl apply -f 01-secrets.yaml
# Or use AWS Secrets Manager + External Secrets Operator for full prod hardening.
#
# Generate a strong key:  openssl rand -hex 32
#
# The same master key is used in two namespaces:
#   - llmgw/litellm-secret  → LiteLLM reads it at startup
#   - summariser/litellm-secret → FastAPI app sends it as Bearer token
#
# §7.2: Bedrock Guardrail ID and version for content moderation + prompt injection.
# Create the guardrail first via: ./llm-setup.sh (§7 section) or AWS Console.
# Then replace the placeholders below with the real values and re-apply.
---
apiVersion: v1
kind: Secret
metadata:
  name: bedrock-guardrail-secret
  namespace: llmgw
type: Opaque
stringData:
  guardrail-id: ""         # e.g. abc123def456
  guardrail-version: "1"          # e.g. 1
---
# Anthropic API key — used for direct (non-Bedrock) Claude model access.
# Commented out: requires a separate Anthropic API key (additional cost).
# To enable: uncomment below, fill in the real key, apply, and uncomment
# the model entry in 02-configmap-litellm.yaml and env var in 04-litellm.yaml.
#
# ---
# apiVersion: v1
# kind: Secret
# metadata:
#   name: anthropic-secret
#   namespace: llmgw
# type: Opaque
# stringData:
#   api-key: "sk-ant-REPLACE_WITH_REAL_KEY"
---
# REQ §6: SLACK_WEBHOOK_URL — incoming webhook for budget spend alerts at 80%
#   Create at: https://api.slack.com/apps → Incoming Webhooks
#   Format:    https://hooks.slack.com/services/T.../B.../...
---
apiVersion: v1
kind: Secret
metadata:
  name: litellm-secret
  namespace: llmgw
type: Opaque
stringData:
  master-key: ""   # e.g. sk-$(openssl rand -hex 32)
---
apiVersion: v1
kind: Secret
metadata:
  name: litellm-secret
  namespace: summariser
type: Opaque
stringData:
  master-key: ""   # must match the key above
---
# Grafana admin password — generate with: openssl rand -hex 16
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-secret
  namespace: monitoring
type: Opaque
stringData:
  admin-password: "REPLACE_WITH_STRONG_PASSWORD"   # openssl rand -hex 16
---
# REQ §6: Slack webhook for budget spend alerts (80% threshold)
apiVersion: v1
kind: Secret
metadata:
  name: litellm-alerting
  namespace: llmgw
type: Opaque
stringData:
  slack-webhook-url: "https://hooks.slack.com/services/REPLACE/WITH/REAL_WEBHOOK"
