# LiteLLM service account — needs Bedrock invoke permissions via IRSA
# ARN comes from: terraform output litellm_irsa_role_arn
apiVersion: v1
kind: ServiceAccount
metadata:
  name: litellm-app
  namespace: llmgw
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::409633134924:role/litellm-irsa"
---
# FastAPI app service account — needs S3, DynamoDB, Bedrock, KMS via IRSA
# ARN comes from: terraform output app_irsa_role_arn
apiVersion: v1
kind: ServiceAccount
metadata:
  name: summariser-app
  namespace: summariser
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::409633134924:role/summariser-app-irsa"
