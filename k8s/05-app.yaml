apiVersion: apps/v1
kind: Deployment
metadata:
  name: summariser-app
  namespace: summariser
  labels:
    app: summariser-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: summariser-app
  template:
    metadata:
      labels:
        app: summariser-app
    spec:
      serviceAccountName: summariser-app

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: summariser-app
                topologyKey: kubernetes.io/hostname

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      containers:
        - name: app
          # Replace with your ECR image after: docker build + push
          image: 409633134924.dkr.ecr.us-east-1.amazonaws.com/summariser-app:latest
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: S3_BUCKET
              value: "summariser-bucket-409633134924"
            - name: DYNAMODB_TABLE
              value: "transcribe-jobs"
            - name: AWS_REGION
              value: "us-east-1"
            - name: LITELLM_URL
              value: "http://litellm.llmgw.svc.cluster.local:4000"
            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secret
                  key: master-key
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: summariser-app
  namespace: summariser
spec:
  selector:
    app: summariser-app
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  type: ClusterIP
